<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatjažC</title>

<style>
body{
    font-family: Georgia, serif;
    background:white;
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.logo{
    text-align:center;
    margin-bottom:60px;
}

.logo img{
    width:100%;
    max-width:700px;
    height:auto;
}

.section{
    margin-top:60px;
}

.section h2{
    font-weight:normal;
    margin-bottom:30px;
}

.work{
    margin-bottom:50px;
}

.work img{
    width:100%;
    height:auto;
    cursor:pointer;
}

.caption{
    display:none;
    margin-top:15px;
    font-size:1.1em;
    line-height:1.5;
}

.work.active .caption{
    display:block;
}
</style>
</head>

<body>

<div class="logo">
    <img src="Logo.jpg" alt="MC Logo">
</div>

<div class="section">
<h2>Abstrakcije · 2021</h2>

<div class="work" onclick="this.classList.toggle('active')">
<img src="IMG_1082.jpeg">
<div class="caption">
<strong>Rebirth</strong><br>
Akril na platnu<br>
150 × 100 cm<br>
2021
</div>
</div>

<div class="work" onclick="this.classList.toggle('active')">
<img src="IMG_1083.jpeg">
<div class="caption">
<strong>Sinestezija</strong><br>
Akril na platnu<br>
80 × 60 cm<br>
2021
</div>
</div>

<div class="work" onclick="this.classList.toggle('active')">
<img src="IMG_1085.jpeg">
<div class="caption">
<strong>Evolution</strong><br>
Akril na platnu<br>
60 × 80 cm<br>
2021
</div>
</div>

</div>

<div class="section">
<h2>Piran · akvareli · 2026</h2>

<div class="work"><img src="IMG_4068.jpeg"></div>
<div class="work"><img src="IMG_4075.jpeg"></div>
<div class="work"><img src="IMG_4083.jpeg"></div>
<div class="work"><img src="IMG_4095.jpeg"></div>
<div class="work"><img src="IMG_4096.jpeg"></div>
<div class="work"><img src="IMG_4153.jpeg"></div>
<div class="work"><img src="IMG_4170.jpeg"></div>

</div>

</body>
</html>
